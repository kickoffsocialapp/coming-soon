  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    background: #0a1207;

    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    min-height: 100vh;
  }

    height: auto;
    margin: 0 auto 40px;
    display: block;
  }
  .soon {
    font-size: clamp(28px, 8vw, 44px);
    font-weight: 900;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1.1;
  }
  .soon .thin { display: block; font-weight: 300; font-size: 0.42em; letter-spacing: 0.12em; color: rgba(255,255,255,0.55); margin-bottom: 10px; }
  .sub {
    margin: 20px auto 36px;
    font-size: clamp(14px, 4vw, 16px);
    font-weight: 400;
    line-height: 1.6;
    color: rgba(255,255,255,0.6);
    max-width: 380px;
  }
  .cta {
    display: inline-block;
    text-decoration: none;
    color: #4bff60;
    background: transparent;
    border: 1.5px solid #4bff60;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.02em;
    padding: 14px 24px;
    border-radius: 8px;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .cta:hover { transform: translateY(-2px); background: rgba(75,255,96,0.10); }
  .foot { margin-top: 44px; font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 0.04em; }
