  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:#040F04; color:var(--text); line-height:1.55;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  p{line-height:1.4}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
  section{position:relative}
  .eyebrow{color:var(--muted);font-weight:700;font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
  h1,h2,h3{font-weight:900;letter-spacing:-.02em;line-height:1.03}
  h2{font-size:clamp(30px,5vw,46px)}
  p.lead{color:var(--muted);font-size:clamp(14px,2.2vw,17px);max-width:620px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:15px;padding:14px 24px;border-radius:10px;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease;border:none}
  .btn-primary{background:#152713;color:#fff;border:1px solid #416244;border-radius:12px;box-shadow:none;text-transform:uppercase;letter-spacing:.06em}
  .btn-primary:hover{transform:translateY(-2px);border-color:var(--green);box-shadow:none}
  .btn-ghost{background:transparent;color:#fff;border:1px solid var(--line)}
  .btn-ghost:hover{border-color:rgba(255,255,255,.35);color:#fff}
  .pitch-glow{position:absolute;inset:0;pointer-events:none;background:none;z-index:0}

  /* NAV */
  nav{position:sticky;top:0;z-index:50;background:rgba(21,39,19,.35);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);}
  .nav-in{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:82px}
  .nav-in .logo{justify-self:start}
  .nav-in .nav-links{justify-self:center}
  .nav-in .nav-cta{justify-self:end}
  .logo{display:flex;align-items:center;gap:9px;font-weight:900;font-size:20px;letter-spacing:-.02em}
  .logo .ball{width:26px;height:26px;border-radius:50%;background:conic-gradient(#fff 0 25%,#0a0a0a 0 50%,#fff 0 75%,#0a0a0a 0);border:2px solid var(--green)}
  .logo b{color:var(--green)}
  .nav-links{display:flex;align-items:center;gap:30px}
  .nav-links a{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;transition:color .2s}
  .nav-links a:hover{color:#fff}
  .nav-cta{padding:9px 18px;font-size:13px}
  @media(min-width:761px){nav .nav-in{max-width:none;padding:0 20px}}
  @media(max-width:760px){.nav-links{display:none}.nav-in{grid-template-columns:1fr auto}}

  /* HERO */
  .hero{padding:72px 0 40px;overflow:hidden}
  .hero-grid{display:grid;grid-template-columns:1fr;gap:40px;align-items:center;position:relative;z-index:1}
  .hero-grid>.phone-wrap{justify-self:center}
  .hero h1{font-size:clamp(44px,7.5vw,88px);line-height:.95;text-transform:uppercase;letter-spacing:-.01em;font-style:italic;}
  .hero-copy{position:relative;text-align:center}
  .hero-copy .lead{margin-left:auto;margin-right:auto}
  .hero-copy>*{position:relative;z-index:1}
  .hero-copy>
  .hero h1 .pre{font-weight:900}
  .mbr{display:none}
  @media(max-width:520px){.mbr{display:inline}}
  
  .hero h1 .hl{color:#fff;font-style:italic;font-weight:900}
  .hero h1 .tac{color:#fff}
  .hero .lead{margin:22px auto 30px}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap}
  .hero-note{margin-top:18px;color:var(--muted2);font-size:13px;display:flex;align-items:center;gap:8px}
  .hero-note .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
  @media(max-width:860px){.hero-grid{grid-template-columns:1fr;gap:36px}.phone-wrap{margin:0 auto;padding-right:0}.hero h1{transform:none}}

  /* PHONE MOCKUP */
  .phone-wrap{justify-self:center;position:relative;perspective:1300px}
@keyframes phoneFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .phone{width:240px;height:498px;border-radius:42px;background:linear-gradient(160deg,#1c1c1c,#000);padding:12px;border:1px solid #2a2a2a;transform:rotateY(-22deg) rotateX(8deg);transform-style:preserve-3d;transition:transform .25s ease-out;will-change:transform;box-shadow:2px 2px 0 #101010,4px 4px 0 #0d0d0d,6px 6px 0 #0a0a0a,8px 8px 0 #070707,10px 10px 2px #040404,38px 48px 95px rgba(0,0,0,.7)}
  .screen:after{content:"";position:absolute;inset:0;border-radius:32px;background:linear-gradient(115deg,rgba(255,255,255,.10),rgba(255,255,255,.03) 22%,transparent 45%);pointer-events:none;z-index:5}
  .screen{width:100%;height:100%;border-radius:32px;background:linear-gradient(180deg,#0c120b,#070907);overflow:hidden;position:relative;display:flex;flex-direction:column}
  .screen-top{padding:18px 16px 10px;text-align:center}
  .screen-top .kick{font-weight:900;font-size:15px}.screen-top .kick b{color:var(--green)}
  .scorebar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;margin:6px 12px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px}
  .scorebar .team{text-align:center;flex:1}
  .scorebar .team span{display:block;font-size:10px;color:var(--muted)}
  .scorebar .team b{font-size:28px}
  .scorebar .vs{font-size:11px;color:var(--muted2);padding:0 6px}
  .pitch{flex:1;margin:8px 12px;border-radius:14px;background:linear-gradient(180deg,#0f1f0e,#0a170a);border:1px solid rgba(75,254,95,.15);position:relative;overflow:hidden}
  .pitch:before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,.12)}
  .pitch:after{content:"";position:absolute;left:50%;top:50%;width:60px;height:60px;border:1px solid rgba(255,255,255,.12);border-radius:50%;transform:translate(-50%,-50%)}
  .dotp{position:absolute;width:22px;height:22px;border-radius:50%;background:var(--green2);border:2px solid #fff}
  .dotp.b{background:#2f6df6}
  .ovr-mini{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:var(--green);color:#052e0a;font-weight:900;font-size:11px;padding:5px 12px;border-radius:999px}

  /* SECTION HEADING */
  .sec{padding:84px 0}
  .sec-head{text-align:center;max-width:640px;margin:0 auto 54px}
  .sec-head p{color:var(--muted);margin-top:14px;font-size:14px}

  /* FEATURE ROWS */
  .feat{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;margin:0 0 78px}
  .feat:nth-child(even) .feat-visual{order:2}
  .feat h3{font-size:clamp(24px,3.4vw,32px);margin-bottom:14px}
  .feat p{color:var(--muted);max-width:460px;font-size:14px}
  .feat ul{list-style:none;margin-top:18px;display:flex;flex-direction:column;gap:10px}
  .feat li{display:flex;align-items:flex-start;gap:8px;color:var(--muted);font-size:14px}
  .feat li svg{width:13px;height:13px;color:var(--muted);flex-shrink:0;margin-top:3px}
  .feat-visual{background:linear-gradient(160deg,var(--card),#0a0d09);border:1px solid var(--line);border-radius:22px;padding:26px;min-height:260px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .feat-visual:before{content:"";position:absolute;inset:0;background:none}
  @media(max-width:820px){.feat{grid-template-columns:1fr;gap:26px;margin-bottom:54px}.feat:nth-child(even) .feat-visual{order:0}}

  /* mini widgets inside feature visuals */
  .teams-viz{display:flex;gap:14px;width:100%;position:relative;z-index:1}
  .teams-viz .col{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:12px}
  .teams-viz .col h5{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;text-align:center}
  .teams-viz .row{display:flex;align-items:center;gap:8px;padding:6px 0}
  .teams-viz .av{width:22px;height:22px;border-radius:50%;background:var(--green2);border:1.5px solid #fff}
  .teams-viz .colB .av{background:#2f6df6}
  .teams-viz .nm{font-size:12px;flex:1}
  .teams-viz .rt{font-size:11px;font-weight:800;color:var(--green)}

footer .logo-img{height:22px;width:120px}
.logo-mock{height:15px;width:80px;background-position:center}
.screen-img{width:100%;height:100%;object-fit:cover;display:block}
.phone-feat{width:184px;height:398px;border-radius:32px;background:linear-gradient(160deg,#1c1c1c,#000);padding:8px;border:1px solid #2a2a2a;box-shadow:-26px 34px 70px rgba(0,0,0,.6);margin:0 auto;position:relative;z-index:1;transform:perspective(1200px) rotateY(14deg) rotateX(4deg);transition:transform .35s ease}
.phone-feat:hover{transform:perspective(1200px) rotateY(6deg) rotateX(2deg)}
.phone-feat img{width:100%;height:100%;object-fit:cover;display:block;border-radius:24px}
.phone-wrap>.phone{position:relative;z-index:2}
.store-badges{display:flex;justify-content:center;gap:14px;margin:52px auto 12px;position:relative;z-index:1;flex-wrap:wrap}
.sbadge{display:flex;align-items:center;gap:11px;background:#152713;border:1px solid #416244;border-radius:12px;padding:10px 20px;width:190px;justify-content:flex-start;transition:border-color .2s,transform .2s}
.sbadge:hover{border-color:var(--green);transform:translateY(-2px)}
.sbadge svg{width:24px;height:24px;color:#fff}
.sbadge small{display:block;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);font-weight:700}
.sbadge b{display:block;font-size:15px;font-weight:800;color:#fff;line-height:1.15}

.phones-row{display:flex;justify-content:center;gap:16px;margin-top:56px;position:relative;z-index:1}
.phones-row .phone{position:relative;z-index:1;flex-shrink:0;width:134px;height:280px;padding:5px;border-radius:22px;transform:none;transition:transform .3s ease;box-shadow:2px 2px 0 #0d0d0d,4px 4px 0 #090909,16px 22px 45px rgba(0,0,0,.55)}
.phones-row .phone .screen{border-radius:17px}
.phones-row .rowshot{width:100%;height:100%;object-fit:cover;display:block}
.phones-row .phone:hover{transform:scale(1.06)}
@media(max-width:900px){
  .phones-row{justify-content:flex-start;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory;padding:6px 24px 18px}
  .phones-row .phone{scroll-snap-align:center}
}

.hero-pair{display:flex;gap:24px;align-items:center;perspective:1300px}
.hero-pair .phone{width:200px;height:415px;padding:9px;border-radius:36px}
.hero-pair .phone .screen{border-radius:28px}
.hero-pair .phone:first-child{transform:rotateY(-14deg) rotateX(4deg)}
.hero-pair .phone.hp2{transform:rotateY(14deg) rotateX(4deg)}
.hero-pair .phone{transition:transform .35s ease}
.hero-pair .phone:hover{transform:rotateY(0) rotateX(0) scale(1.03)}
.screen-img-2{width:100%;height:100%;object-fit:cover;display:block;border-radius:28px}


.mswipe{display:none;flex-direction:column;align-items:center;margin-top:44px;position:relative;z-index:1}
.msphone{width:220px;height:458px;padding:10px;border-radius:36px;transform:none;touch-action:pan-y;position:relative;z-index:1;box-shadow:2px 2px 0 #101010,4px 4px 0 #0d0d0d,6px 6px 0 #0a0a0a,14px 18px 36px rgba(0,0,0,.55)}
.msphone .screen{position:relative;border-radius:28px}
.msphone .screen img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:28px}
.ms-b{opacity:0;transition:opacity .45s ease,transform .45s ease}
@media(max-width:600px){.phones-row{display:none}.mswipe{display:flex}.hero{padding-bottom:40px}}
.hdots{display:none;width:100%;justify-content:center;gap:8px;margin-top:14px}
.mswipe .hdots{display:flex}
.hdots button{width:8px;height:8px;border-radius:50%;border:none;background:rgba(255,255,255,.25);cursor:pointer;padding:0;transition:background .3s,transform .3s}
.hdots button.on{background:var(--green);transform:scale(1.25)}
.screen-img-b{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:28px;opacity:0;transition:opacity .45s ease,transform .45s ease;pointer-events:none}
@media(max-width:560px){
  .hero-pair{flex-wrap:wrap;justify-content:center;margin:0 auto;padding-right:0}
  .hero-pair .phone{width:200px;height:415px;touch-action:pan-y}
  .hero-pair .phone:first-child{transform:none}

    var base={ry:-22,rx:8};
    function set(ry,rx){ phone.style.transform='rotateY('+ry+'deg) rotateX('+rx+'deg)'; }
    set(base.ry,base.rx);
    zone.addEventListener('mousemove',function(e){
      var r=phone.getBoundingClientRect();
      var dx=(e.clientX-(r.left+r.width/2))/r.width;
      var dy=(e.clientY-(r.top+r.height/2))/r.height;
      var ry=Math.max(base.ry-12,Math.min(base.ry+12,base.ry-dx*20));
      var rx=Math.max(base.rx-8,Math.min(base.rx+8,base.rx+dy*14));
      set(ry,rx);
    });
    zone.addEventListener('mouseleave',function(){ set(base.ry,base.rx); });
  })();
</script>
</body>
</html>
